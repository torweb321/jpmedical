<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>启航医疗 · 销售助手</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --primary: #0a2a5c; --gold: #c9a84c; --bg: #f5f7fa; --white: #fff; --text: #333; --text-light: #666; --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,.08); }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; color: var(--text); line-height: 1.6; background: var(--bg); }

/* Password gate */
.password-gate { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
.password-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.1); max-width: 400px; width: 100%; text-align: center; }
.password-box h1 { font-size: 22px; color: var(--primary); margin-bottom: 8px; }
.password-box p { font-size: 14px; color: var(--text-light); margin-bottom: 24px; }
.password-box input { width: 100%; padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; margin-bottom: 16px; }
.password-box input:focus { border-color: var(--gold); outline: none; }
.password-box .error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; display: none; }
.password-box button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
.password-box button:hover { background: #1a4a8a; }

#app { display: none; }

/* Nav */
.agent-nav { background: var(--primary); color: white; padding: 0 16px; position: sticky; top: 0; z-index: 100; }
.agent-nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 52px; }
.agent-nav h2 { font-size: 16px; }
.agent-nav h2 span { color: var(--gold); font-weight: 400; }
.agent-nav .nav-right { display: flex; gap: 12px; align-items: center; }
.agent-nav .nav-right span { font-size: 12px; opacity: .7; }
.agent-nav a { color: rgba(255,255,255,.7); text-decoration: none; font-size: 13px; }
.agent-nav a:hover { color: white; }

/* Layout */
.agent-body { display: flex; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 52px); }

/* Sidebar */
.sidebar { width: 200px; flex-shrink: 0; background: white; border-right: 1px solid #eee; padding: 16px 0; position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto; }
.sidebar a { display: block; padding: 8px 20px; font-size: 13px; color: var(--text); text-decoration: none; border-left: 3px solid transparent; }
.sidebar a:hover { background: var(--bg); }
.sidebar a.active { border-left-color: var(--gold); background: rgba(201,168,76,.08); color: var(--primary); font-weight: 600; }
.sidebar .section-label { font-size: 11px; text-transform: uppercase; color: #999; padding: 12px 20px 4px; font-weight: 600; letter-spacing: .5px; }

/* Content */
.content { flex: 1; padding: 24px 32px; overflow-y: auto; max-width: 800px; }
.content h3 { font-size: 20px; color: var(--primary); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--gold); }
.content h4 { font-size: 15px; color: var(--primary); margin: 20px 0 8px; }
.content p, .content li { font-size: 14px; color: var(--text); margin-bottom: 8px; }
.content ul, .content ol { padding-left: 20px; margin-bottom: 12px; }
.content .highlight { background: #fffde7; padding: 12px 16px; border-radius: 8px; border-left: 3px solid var(--gold); margin: 12px 0; font-size: 14px; }

/* Cards */
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin: 12px 0; }
.info-card { background: var(--bg); padding: 16px; border-radius: 8px; }
.info-card .label { font-size: 11px; color: #999; text-transform: uppercase; }
.info-card .value { font-size: 16px; font-weight: 700; color: var(--primary); margin-top: 2px; }
.info-card .value small { font-size: 13px; font-weight: 400; color: var(--text-light); }

/* Tables */
.agent-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 12px 0; }
.agent-table th { background: var(--primary); color: white; padding: 8px 12px; text-align: left; font-weight: 600; }
.agent-table td { padding: 8px 12px; border-bottom: 1px solid #eee; }
.agent-table tr:hover td { background: #f8f9fc; }
.agent-table .price { font-weight: 700; color: var(--primary); white-space: nowrap; }

/* Quick reference */
.quick-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding: 12px 16px; background: white; border-radius: 8px; box-shadow: var(--shadow); align-items: center; }
.quick-bar input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.quick-bar .badge { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: var(--bg); color: var(--text-light); }
.quick-bar .badge.gold { background: rgba(201,168,76,.15); color: #9a7e2c; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .content { padding: 16px; }
  .card-grid { grid-template-columns: 1fr; }
}

.hidden { display: none; }
.tab-content { padding-top: 8px; }

/* Collapse */
.collapse-toggle { cursor: pointer; user-select: none; }
.collapse-toggle::before { content: '▶ '; font-size: 10px; color: var(--gold); }
.collapse-toggle.open::before { content: '▼ '; }
.collapse-body { display: none; margin: 8px 0 8px 16px; }
.collapse-body.open { display: block; }
</style>
</head>

<script>
// ===== CONFIG =====
const PASSWORD_HASH = 'qihang2026'; // 明文密码，后续可改
// =================

// Password
function checkPassword() {
  const pw = document.getElementById('passwordInput').value;
  if (pw === PASSWORD_HASH) {
    document.getElementById('passwordGate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('passwordError').style.display = 'block';
  }
}
function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('passwordGate').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
  document.getElementById('passwordError').style.display = 'none';
}

// Init
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toLocaleString('zh-CN', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

/*** 在所有函数定义之后初始化 ***/
window.addEventListener('DOMContentLoaded', () => {
  const SECTIONS = [
    { id:'quick', label:'⚡ 速查', fn: quickRef },
    { id:'products', label:'产品总览', fn: productOverview },
    { id:'matrix', label:'业务矩阵', fn: productMatrix },
    { id:'main-packages', label:'主推套餐', fn: mainPackages },
    { id:'second-opinion', label:'视频二诊', fn: secondOpinion },
    { id:'all-prices', label:'价格速查', fn: allPrices },
    { id:'scripts', label:'销售话术', fn: salesScripts },
    { id:'faq', label:'常见问题', fn: faqContent },
    { id:'objections', label:'异议处理', fn: objectionContent },
    { id:'process', label:'成交流程', fn: processContent },
    { id:'contact', label:'📞 联系方式', fn: contactInfo }
  ];

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = SECTIONS.map(s =>
    `<a href="#" onclick="showSection('${s.id}');return false" data-section="${s.id}">${s.label}</a>`
  ).join('');

  window.__SECTIONS = SECTIONS;
  showSection('quick');
  updateClock();
  setInterval(updateClock, 60000);
});

window.showSection = function(id) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  document.querySelector(`.sidebar a[data-section="${id}"]`)?.classList.add('active');
  const section = window.__SECTIONS.find(s => s.id === id);
  if (!section) return;
  const area = document.getElementById('contentArea');
  area.innerHTML = typeof section.fn === 'function' ? section.fn() : section.fn;
  area.querySelectorAll('.collapse-toggle').forEach(el => {
    el.addEventListener('click', () => {
      el.classList.toggle('open');
      const target = document.getElementById(el.dataset.target);
      if (target) target.classList.toggle('open');
    });
  });
};

window.searchContent = function() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { showSection('quick'); return; }
  const area = document.getElementById('contentArea');
  const found = window.__SECTIONS.filter(s => {
    const text = (typeof s.fn === 'function' ? stripHtml(s.fn()) : s.fn).toLowerCase();
    return text.includes(q);
  });
  if (found.length === 0) {
    area.innerHTML = '<p style="color:#999;text-align:center;padding:40px;">未找到相关内容</p>';
    return;
  }
  area.innerHTML = `<h3>搜索结果</h3><ul>${found.map(r => `<li style="cursor:pointer;color:var(--primary);" onclick="showSection('${r.id}')">${r.label}</li>`).join('')}</ul>`;
};
